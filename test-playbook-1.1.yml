---
- name: Playbook thuc thi va ghi log audit tren RHEL
  hosts: all
  become: yes
  become_method: sudo
  tasks:
    - name: 1. Them dong no_proxy vao /etc/environment (Dung lineinfile cho thong minh)
      ansible.builtin.lineinfile:
        path: /etc/environment
        line: 'no_proxy="msb.com"'
        state: present
        insertafter: EOF
      register: update_env

    - name: 2. Ghi log vao /var/log/messages bang duong dan tuyet doi
      ansible.builtin.shell: |
        /usr/bin/logger -t ANSIBLE_AUDIT "USER: admin_local | ACTION: Checked/Updated /etc/environment | CHANGED: {{ update_env.changed }}"
      args:
        executable: /bin/bash

    - name: 3. Chay lenh kiem tra (whoami va ip a) nhu yeu cau ban dau
      ansible.builtin.shell: |
        RES_USER=$(/usr/bin/whoami)
        /usr/bin/logger -t ANSIBLE_AUDIT "USER: admin_local | CMD: whoami | RESULT: $RES_USER"
        
        /usr/bin/ip a > /tmp/ip_check.txt
        /usr/bin/logger -t ANSIBLE_AUDIT "USER: admin_local | CMD: ip a | STATUS: Saved to /tmp/ip_check.txt"
      args:
        executable: /bin/bash

    - name: 4. Doc file environment de hien thi len man hinh Ansible
      ansible.builtin.command: cat /etc/environment
      register: final_env

    - name: 5. Show ket qua cuoi cung
      ansible.builtin.debug:
        msg: 
          - "Noi dung file environment:"
          - "{{ final_env.stdout_lines }}"
          - "Check log he thong bang lenh: sudo grep ANSIBLE_AUDIT /var/log/messages"
