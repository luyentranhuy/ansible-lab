---
- name: Playbook thuc thi va ghi log audit tren RHEL
  hosts: all
  become: yes
  become_method: sudo
  gather_facts: no   # không cần gather facts, dùng date qua shell
  tasks:
    - name: 1. Ghi dong "task ansible chay luc ..." vao file /home/admin_local/test_ansible (append)
      ansible.builtin.shell: |
        echo "task ansible chay luc $(date '+%Y-%m-%d %H:%M:%S')" >> /home/admin_local/test_ansible
      args:
        executable: /bin/bash
      register: write_task
      changed_when: true

    - name: 2. Ghi log vao /var/log/messages thong bao da ghi file
      ansible.builtin.shell: |
        /usr/bin/logger -t ANSIBLE_AUDIT "USER: admin_local | ACTION: Appended timestamp to /home/admin_local/test_ansible"
      args:
        executable: /bin/bash

    - name: 3. Chay lenh kiem tra (whoami va ip a) nhu yeu cau ban dau
      ansible.builtin.shell: |
        RES_USER=$(/usr/bin/whoami)
        /usr/bin/logger -t ANSIBLE_AUDIT "USER: admin_local | CMD: whoami | RESULT: $RES_USER"
        
        /usr/bin/ip a > /tmp/ip_check.txt
        /usr/bin/logger -t ANSIBLE_AUDIT "USER: admin_local | CMD: ip a | STATUS: Saved to /tmp/ip_check.txt"
      args:
        executable: /bin/bash

    - name: 4. Doc file test_ansible de hien thi len man hinh Ansible
      ansible.builtin.command: cat /home/admin_local/test_ansible
      register: test_file_content
      ignore_errors: yes

    - name: 5. Doc file environment de hien thi (neu can, khong bat buoc)
      ansible.builtin.command: cat /etc/environment
      register: final_env
      ignore_errors: yes

    - name: 6. Show ket qua cuoi cung
      ansible.builtin.debug:
        msg: 
          - "Noi dung file /home/admin_local/test_ansible (dong cuoi cung la dong vua them):"
          - "{{ test_file_content.stdout_lines | default(['File not found or empty']) }}"
          - "Noi dung file /etc/environment (neu co):"
          - "{{ final_env.stdout_lines | default(['File not found or empty']) }}"
          - "Check log he thong bang lenh: sudo grep ANSIBLE_AUDIT /var/log/messages"
