- name: Test connection and run basic commands
  hosts: all
  gather_facts: no
  tasks:
    - name: Run whoami command
      ansible.builtin.command: whoami
      register: whoami_result

    - name: Show whoami output
      ansible.builtin.debug:
        msg: "The user is: {{ whoami_result.stdout }}"

    - name: Run ip a command
      ansible.builtin.command: ip a
      register: ip_result

    - name: Show ip a output
      ansible.builtin.debug:
        var: ip_result.stdout_lines
